<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Батарейки с контактами</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 80px;
            flex: 1;
        }

        .battery {
            display: flex;
            align-items: stretch;
            width: 60%;
            flex: 1;
        }

        .terminal {
            width: 8px;
            height: 32px;          
            align-self: center;
            margin: 0;
            border-radius: 1px;
        }

        .rectangle {
            flex: 1;
            background-color: rgba(83, 156, 83, 0.245);
            display: flex;
            justify-content: flex-end;
        }

        .inner1 {
            width: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(0, 255, 34);
            font-size: 32px;
            font-weight: bold;
        }

        .inner2 {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(255, 242, 0);
            font-size: 32px;
            font-weight: bold;
        }

        .inner3 {
            width: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(255, 0, 0);
            font-size: 32px;
            font-weight: bold;
        }

        .battery .terminal {
            background-color: rgb(83, 156, 83, 0.245);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="battery battery1">
            <div class="terminal"></div>
            <div class="rectangle">
                <div class="inner1"></div>
            </div>
        </div>
        <div class="battery battery2">
            <div class="terminal"></div>
            <div class="rectangle">
                <div class="inner2"></div>
            </div>
        </div>
        <div class="battery battery3">
            <div class="terminal"></div>
            <div class="rectangle">
                <div class="inner3"></div>
            </div>
        </div>
    </div>
</body>
</html>
