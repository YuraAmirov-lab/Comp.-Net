<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Три резиновых прямоугольника</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;        /* центрируем внешние прямоугольники */
            gap: 50px;
            padding: 80px;
            flex: 1;
        }

        .rectangle {
            width: 60%;                  /* ширина внешнего прямоугольника */
            background-color: rgba(83, 156, 83, 0.245);
            display: flex;                /* делаем контейнером для внутреннего */
            justify-content: flex-end;    /* прижимаем внутренний блок к правому краю */
            flex: 1;                      /* внешний прямоугольник растягивается внутри .container */
        }

        .inner1 {
            width: 80%;                   /* занимает 70% ширины родителя */
            display: flex;                 /* центрируем текст */
            align-items: center;
            justify-content: center;
            background-color: rgb(0, 255, 34);
            font-size: 32px;
            font-weight: bold;
        }
        .inner2 {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(255, 242, 0);
            font-size: 32px;
            font-weight: bold;
        }
        .inner3 {
            width: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(255, 0, 0);
            font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rectangle">
            <div class="inner1"></div>
        </div>
        <div class="rectangle">
            <div class="inner2"></div>
        </div>
        <div class="rectangle">
            <div class="inner3"></div>
        </div>
    </div>
</body>
</html>
